<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#16a863" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="AfyaLink" />
    <meta name="description" content="Your health, connected. Accessible, affordable healthcare for every Kenyan." />
    <meta name="keywords" content="healthcare, medical, appointments, doctors, Kenya, telemedicine" />
    <meta name="author" content="AfyaLink Technologies" />
    
    <!-- Open Graph / Social Media -->
    <meta property="og:title" content="AfyaLink - Smart Healthcare" />
    <meta property="og:description" content="Your health, connected. Accessible healthcare for every Kenyan." />
    <meta property="og:image" content="/icons/icon-512x512.png" />
    <meta property="og:url" content="https://afyalink.com" />
    <meta property="og:type" content="website" />
    
    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="AfyaLink - Smart Healthcare" />
    <meta name="twitter:description" content="Your health, connected." />
    <meta name="twitter:image" content="/icons/icon-512x512.png" />
    
    <!-- Apple Touch Icon -->
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />
    
    <!-- Preconnect for performance -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    
    <!-- Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;500;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;0,600;0,700;1,400&display=swap" rel="stylesheet" />
    
    <title>AfyaLink — Smart Healthcare, Connected Care</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(registration => {
              console.log('SW registered: ', registration);
            })
            .catch(registrationError => {
              console.log('SW registration failed: ', registrationError);
            });
        });
      }
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
